<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data</title>
</head>
<body>
    <h1>Student Form</h1>
    <form action="/add-student" method="POST">
        <input type="text" name="name" id="myInput" placeholder="Enter Your Name" required><br>
        <input type="text" name="age" id="myInput" placeholder="Enter Your Age" required><br>
        <input type="text" name="email" id="myInput" placeholder="Enter Your Email" required><br>
        <input type="text" name="city" id="myInput" placeholder="Enter Your City" required><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
